<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panes</title>
    <link rel="icon" type="image/png" href="/src/assets/brand/panes-app-icon.png" />
    <script>
      (function () {
        // Blocking paint hint: stamp data-theme before first paint so returning
        // users never see a flash of the wrong theme while the async config
        // load (main.tsx) resolves the real, authoritative preference.
        try {
          var pref = localStorage.getItem("panes:theme-preference");
          var mode =
            pref === "light" || pref === "dark"
              ? pref
              : pref === "system"
                ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
                    ? "light"
                    : "dark")
                : "dark";
          document.documentElement.dataset.theme = mode;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
