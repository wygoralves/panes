name: CI and Release

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test -- --passWithNoTests
      - name: Build frontend
        run: pnpm build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Ensure frontendDist placeholder
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            echo "<!doctype html><html><body>CI placeholder</body></html>" > dist/index.html
          fi
      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt -- --check
      - name: Rust check
        working-directory: src-tauri
        run: cargo check

  macos_compat:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust targets for macOS compatibility checks
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Ensure frontendDist placeholder
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            echo "<!doctype html><html><body>CI placeholder</body></html>" > dist/index.html
          fi
      - name: Rust check for Intel macOS target
        working-directory: src-tauri
        run: cargo check --target x86_64-apple-darwin

  windows_compat:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Ensure frontendDist placeholder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (-not (Test-Path dist/index.html)) {
            Set-Content -Path dist/index.html -Value '<!doctype html><html><body>CI placeholder</body></html>'
          }
      - name: Rust check on Windows
        working-directory: src-tauri
        run: cargo check
      - name: Windows runtime env tests
        working-directory: src-tauri
        run: cargo test runtime_env --lib
      - name: Windows app config tests
        working-directory: src-tauri
        run: cargo test app_config --lib
      - name: Windows file command tests
        working-directory: src-tauri
        run: cargo test commands::files::tests --lib
      - name: Windows keep awake tests
        working-directory: src-tauri
        run: cargo test commands::power::tests --lib
      - name: Windows keep awake backend tests
        working-directory: src-tauri
        run: cargo test power::tests --lib
      - name: Windows terminal tests
        working-directory: src-tauri
        run: cargo test terminal::tests --lib
      - name: Windows Codex engine tests
        working-directory: src-tauri
        run: cargo test codex::tests --lib
      - name: Windows Claude sidecar tests
        working-directory: src-tauri
        run: cargo test claude_sidecar::tests --lib

  windows_bundle_check:
    runs-on: windows-latest
    needs: [frontend, windows_compat]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build desktop assets
        run: pnpm run build:desktop
      - name: Build unsigned Windows NSIS bundle
        run: pnpm exec tauri build --ci --bundles nsis --config src-tauri/tauri.windows.bundle-check.conf.json --no-sign
        env:
          PANES_SKIP_DESKTOP_PREBUILD: "1"
      - name: Validate local Windows NSIS install and bundled sidecar
        shell: pwsh
        run: |
          $setupExe = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *-setup.exe | Select-Object -First 1
          if (-not $setupExe) {
            throw "Windows NSIS installer was not built."
          }

          $installRoot = Join-Path $env:RUNNER_TEMP "panes-bundle-check"
          if (Test-Path $installRoot) {
            Remove-Item -Recurse -Force $installRoot
          }

          $installer = Start-Process -FilePath $setupExe.FullName -ArgumentList @('/S', "/D=$installRoot") -Wait -PassThru
          if ($installer.ExitCode -ne 0) {
            throw "Windows installer exited with code $($installer.ExitCode)."
          }

          $appBinary = Get-ChildItem $installRoot -Recurse -Filter Panes.exe | Select-Object -First 1
          if (-not $appBinary) {
            throw "Unable to locate installed Panes.exe."
          }

          $sidecar = Get-ChildItem $installRoot -Recurse -Filter claude-agent-sdk-server.mjs | Select-Object -First 1
          if (-not $sidecar) {
            throw "Unable to locate bundled Claude sidecar in installed app."
          }

          Get-Command git | Out-Null
          Get-Command node | Out-Null

          $sidecarOut = Join-Path $env:RUNNER_TEMP "panes-bundle-check-sidecar.out"
          $sidecarErr = Join-Path $env:RUNNER_TEMP "panes-bundle-check-sidecar.err"
          if (Test-Path $sidecarOut) { Remove-Item -Force $sidecarOut }
          if (Test-Path $sidecarErr) { Remove-Item -Force $sidecarErr }

          $sidecarProc = Start-Process -FilePath node -ArgumentList $sidecar.FullName -PassThru -RedirectStandardOutput $sidecarOut -RedirectStandardError $sidecarErr
          $ready = $false
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            if ((Test-Path $sidecarOut) -and ((Get-Content $sidecarOut -Raw) -match '"type":"ready"')) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 2
          }

          if (-not $ready) {
            if (Test-Path $sidecarOut) { Get-Content $sidecarOut }
            if (Test-Path $sidecarErr) { Get-Content $sidecarErr }
            throw "Bundled Claude sidecar did not reach ready state."
          }

          if (-not $sidecarProc.HasExited) {
            Stop-Process -Id $sidecarProc.Id -Force
          }

          $appProc = Start-Process -FilePath $appBinary.FullName -WorkingDirectory $appBinary.Directory.FullName -PassThru
          Start-Sleep -Seconds 5
          if ($appProc.HasExited) {
            throw "Panes.exe exited immediately on the Windows runner."
          }
          Stop-Process -Id $appProc.Id -Force

  release:
    name: Automated Release
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    needs: [frontend, rust, macos_compat, windows_compat, windows_bundle_check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      should_release: ${{ steps.release_check.outputs.should_release }}
      released_tag: ${{ steps.release_meta.outputs.tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout release branch with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --force --tags origin

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Evaluate release necessity
        id: release_check
        run: node scripts/should-release.mjs

      - name: Ensure clean working tree before release-it
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree is dirty before release-it:"
            git status --porcelain
            git --no-pager diff --stat
            exit 1
          fi

      - name: Skip release (no release-worthy commits)
        if: steps.release_check.outputs.should_release != 'true'
        run: 'echo "Skipping release: ${{ steps.release_check.outputs.reason }}"'

      - name: Require release token for protected branch push
        if: steps.release_check.outputs.should_release == 'true'
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "RELEASE_TOKEN is required for automated releases on a protected branch."
            echo "Create a fine-grained PAT for a bypass-authorized account and save it as the RELEASE_TOKEN Actions secret."
            exit 1
          fi

      - name: Configure authenticated remote for release push
        if: steps.release_check.outputs.should_release == 'true'
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Configure git user for release commit
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release-it
        if: steps.release_check.outputs.should_release == 'true'
        run: pnpm release -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Capture released tag
        id: release_meta
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          tag="$(git describe --tags --abbrev=0)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Released tag: $tag"

  prepare_release_assets:
    name: Prepare Release Desktop Assets
    if: github.event_name == 'push' && needs.release.outputs.should_release == 'true'
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.released_tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop assets
        run: pnpm run build:desktop

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop-assets
          compression-level: 0
          if-no-files-found: error
          path: |
            dist

  release_bundles:
    name: Build Release Bundles (${{ matrix.platform }})
    if: github.event_name == 'push' && needs.release.outputs.should_release == 'true'
    needs: [release, prepare_release_assets]
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-15, ubuntu-22.04, windows-latest]

    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.released_tag }}

      - name: Download prebuilt desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-desktop-assets
          path: dist

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust for universal macOS build
        if: matrix.platform == 'macos-15'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust
        if: matrix.platform != 'macos-15'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build platform Claude sidecar assets
        run: pnpm run build:claude-sidecar

      - name: Build universal macOS bundles
        if: matrix.platform == 'macos-15'
        run: pnpm exec tauri build --target universal-apple-darwin
        env:
          PANES_SKIP_DESKTOP_PREBUILD: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Verify universal macOS app binary
        if: matrix.platform == 'macos-15'
        run: |
          APP_BINARY="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -path '*.app/Contents/MacOS/Panes' -print -quit)"
          if [ -z "$APP_BINARY" ]; then
            echo "Unable to locate bundled Panes app binary."
            exit 1
          fi

          file "$APP_BINARY"
          lipo -info "$APP_BINARY"
          file "$APP_BINARY" | grep -Eq 'arm64|aarch64'
          file "$APP_BINARY" | grep -q 'x86_64'

      - name: Build Linux Tauri bundles
        if: matrix.platform == 'ubuntu-22.04'
        run: pnpm tauri:build
        env:
          NO_STRIP: "true"
          PANES_SKIP_DESKTOP_PREBUILD: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Windows Tauri bundles
        if: matrix.platform == 'windows-latest'
        run: pnpm tauri:build
        env:
          PANES_SKIP_DESKTOP_PREBUILD: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux assets to GitHub Release
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.released_tag }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb.sig
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload macOS assets to GitHub Release
        if: matrix.platform == 'macos-15'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.released_tag }}
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg.sig
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload Windows assets to GitHub Release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.released_tag }}
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

  update_manifest:
    name: Publish Update Manifest
    if: github.event_name == 'push' && needs.release.outputs.should_release == 'true'
    needs: [release, release_bundles]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate latest.json
        run: node scripts/generate-update-manifest.mjs "${{ needs.release.outputs.released_tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mv latest.json /tmp/latest.json
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          mv /tmp/latest.json latest.json
          git add latest.json
          git commit -m "Update manifest for ${{ needs.release.outputs.released_tag }}"
          git push origin gh-pages-tmp:gh-pages --force

  publish_homebrew_cask:
    name: Publish Homebrew Cask
    if: github.event_name == 'push' && needs.release.outputs.should_release == 'true'
    needs: [release, release_bundles]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_REPO: wygoralves/homebrew-tap
    steps:
      - name: Detect Homebrew tap token
        id: tap_token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout released tag
        if: steps.tap_token.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.released_tag }}

      - uses: actions/setup-node@v4
        if: steps.tap_token.outputs.present == 'true'
        with:
          node-version: 20

      - name: Checkout tap repository
        if: steps.tap_token.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate panes cask
        if: steps.tap_token.outputs.present == 'true'
        run: |
          mkdir -p homebrew-tap/Casks
          node scripts/generate-homebrew-cask.mjs "${{ needs.release.outputs.released_tag }}" --output homebrew-tap/Casks/panes.rb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip cask publish without tap token
        if: steps.tap_token.outputs.present != 'true'
        run: echo "HOMEBREW_TAP_TOKEN not configured; skipping Homebrew cask publish."

      - name: Commit and push cask update
        if: steps.tap_token.outputs.present == 'true'
        working-directory: homebrew-tap
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Tap repository already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/panes.rb
          git commit -m "Update panes cask for ${{ needs.release.outputs.released_tag }}"
          git push origin HEAD:main

  linux_release_smoke:
    name: Linux Release Smoke
    if: github.event_name == 'push' && needs.release.outputs.should_release == 'true'
    needs: [release, update_manifest]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.release.outputs.released_tag }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Linux release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir artifacts --pattern "*.AppImage" --pattern "*.AppImage.sig" --pattern "*.deb" --pattern "*.deb.sig"
          ls -al artifacts

      - name: Validate published updater manifest
        run: |
          APPIMAGE_PATH="$(find artifacts -maxdepth 1 -name '*.AppImage' -print -quit)"
          APPIMAGE_SIG_PATH="$(find artifacts -maxdepth 1 -name '*.AppImage.sig' -print -quit)"
          DEB_PATH="$(find artifacts -maxdepth 1 -name '*.deb' -print -quit)"
          DEB_SIG_PATH="$(find artifacts -maxdepth 1 -name '*.deb.sig' -print -quit)"

          if [ -z "$APPIMAGE_PATH" ] || [ -z "$APPIMAGE_SIG_PATH" ]; then
            echo "Linux AppImage updater assets were not downloaded."
            exit 1
          fi

          if [ -z "$DEB_PATH" ] || [ -z "$DEB_SIG_PATH" ]; then
            echo "Linux Debian updater assets were not downloaded."
            exit 1
          fi

          export APPIMAGE_NAME="$(basename "$APPIMAGE_PATH")"
          export APPIMAGE_SIG="$(tr -d '\r\n' < "$APPIMAGE_SIG_PATH")"
          export DEB_NAME="$(basename "$DEB_PATH")"
          export DEB_SIG="$(tr -d '\r\n' < "$DEB_SIG_PATH")"

          for attempt in 1 2 3 4 5; do
            curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/gh-pages/latest.json" -o latest.json && break
            if [ "$attempt" -eq 5 ]; then
              echo "Unable to fetch latest.json from gh-pages."
              exit 1
            fi
            sleep 5
          done

          node - <<'NODE'
          const fs = require("node:fs");

          const manifest = JSON.parse(fs.readFileSync("latest.json", "utf8"));
          const appImage = manifest.platforms?.["linux-x86_64-appimage"];
          const compat = manifest.platforms?.["linux-x86_64"];
          const deb = manifest.platforms?.["linux-x86_64-deb"];

          if (!appImage || !compat || !deb) {
            throw new Error(
              "latest.json must include linux-x86_64-appimage, linux-x86_64, and linux-x86_64-deb.",
            );
          }

          if (appImage.url !== compat.url || appImage.signature !== compat.signature) {
            throw new Error("linux-x86_64 must remain an AppImage compatibility alias.");
          }

          if (appImage.signature.trim() !== process.env.APPIMAGE_SIG) {
            throw new Error("latest.json AppImage signature does not match the published .sig contents.");
          }

          if (deb.signature.trim() !== process.env.DEB_SIG) {
            throw new Error("latest.json Debian signature does not match the published .sig contents.");
          }

          if (!appImage.url.endsWith(process.env.APPIMAGE_NAME)) {
            throw new Error(`latest.json AppImage URL does not reference ${process.env.APPIMAGE_NAME}.`);
          }

          if (!deb.url.endsWith(process.env.DEB_NAME)) {
            throw new Error(`latest.json Debian URL does not reference ${process.env.DEB_NAME}.`);
          }
          NODE

      - name: Validate Debian package install and bundled sidecar
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libglib2.0-0 \
            libgtk-3-0 \
            libwebkit2gtk-4.1-0 \
            libayatana-appindicator3-1 \
            librsvg2-2

          DEB_PATH="$(find artifacts -maxdepth 1 -name '*.deb' -print -quit)"
          if [ -z "$DEB_PATH" ]; then
            echo "Linux Debian package was not downloaded."
            exit 1
          fi

          PACKAGE_NAME="$(dpkg-deb -f "$DEB_PATH" Package)"
          if ! sudo dpkg -i "$DEB_PATH"; then
            echo "dpkg -i failed for the published Debian package."
            dpkg-deb -I "$DEB_PATH" || true
            exit 1
          fi

          dpkg -s "$PACKAGE_NAME"

          DESKTOP_FILE="$(dpkg -L "$PACKAGE_NAME" | grep '/applications/.*\.desktop$' | head -n 1)"
          SIDECAR_PATH="$(dpkg -L "$PACKAGE_NAME" | grep 'claude-agent-sdk-server\.mjs$' | head -n 1)"
          APP_BINARY="$(dpkg -L "$PACKAGE_NAME" | while IFS= read -r candidate; do
            if [ -f "$candidate" ] && [ -x "$candidate" ] && file "$candidate" | grep -q 'ELF'; then
              echo "$candidate"
              break
            fi
          done)"

          if [ -z "$DESKTOP_FILE" ]; then
            echo "Unable to locate installed desktop entry."
            dpkg -L "$PACKAGE_NAME"
            exit 1
          fi

          if [ -z "$SIDECAR_PATH" ]; then
            echo "Unable to locate bundled Claude sidecar in installed package."
            dpkg -L "$PACKAGE_NAME"
            exit 1
          fi

          if [ -z "$APP_BINARY" ]; then
            echo "Unable to locate installed Panes ELF binary."
            dpkg -L "$PACKAGE_NAME"
            exit 1
          fi

          test -f "$DESKTOP_FILE"
          test -f "$SIDECAR_PATH"
          command -v git
          command -v node

          timeout 20s xvfb-run -a "$APP_BINARY" >/tmp/panes-linux.out 2>/tmp/panes-linux.err || STATUS=$?
          if [ "${STATUS:-0}" -ne 0 ] && [ "${STATUS:-0}" -ne 124 ]; then
            cat /tmp/panes-linux.out || true
            cat /tmp/panes-linux.err || true
            echo "Installed Panes binary failed to start on the Linux smoke runner."
            exit 1
          fi

  macos_intel_release_smoke:
    name: macOS Intel Release Smoke
    if: github.event_name == 'push' && needs.release.outputs.should_release == 'true'
    needs: [release, update_manifest, publish_homebrew_cask]
    runs-on: macos-15-intel
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.release.outputs.released_tag }}
      HOMEBREW_TAP_REPO: wygoralves/homebrew-tap
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download macOS release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir artifacts --pattern "*.dmg" --pattern "*.app.tar.gz"
          ls -al artifacts

      - name: Validate published updater manifest
        run: |
          APP_ARCHIVE="$(find artifacts -maxdepth 1 -name '*.app.tar.gz' -print -quit)"
          if [ -z "$APP_ARCHIVE" ]; then
            echo "Universal macOS updater archive was not downloaded."
            exit 1
          fi

          export APP_ARCHIVE_NAME="$(basename "$APP_ARCHIVE")"

          for attempt in 1 2 3 4 5; do
            curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/gh-pages/latest.json" -o latest.json && break
            if [ "$attempt" -eq 5 ]; then
              echo "Unable to fetch latest.json from gh-pages."
              exit 1
            fi
            sleep 5
          done

          node - <<'NODE'
          const fs = require("node:fs");

          const manifest = JSON.parse(fs.readFileSync("latest.json", "utf8"));
          const darwinArm = manifest.platforms?.["darwin-aarch64"];
          const darwinIntel = manifest.platforms?.["darwin-x86_64"];

          if (!darwinArm || !darwinIntel) {
            throw new Error("latest.json must include darwin-aarch64 and darwin-x86_64.");
          }

          if (darwinArm.url !== darwinIntel.url || darwinArm.signature !== darwinIntel.signature) {
            throw new Error("Both macOS updater targets must point to the same universal asset.");
          }

          if (!darwinArm.url.endsWith(process.env.APP_ARCHIVE_NAME)) {
            throw new Error(`latest.json macOS URL does not reference ${process.env.APP_ARCHIVE_NAME}.`);
          }
          NODE

      - name: Validate universal DMG install and bundled sidecar
        run: |
          DMG_PATH="$(find artifacts -maxdepth 1 -name '*.dmg' -print -quit)"
          if [ -z "$DMG_PATH" ]; then
            echo "Universal macOS DMG was not downloaded."
            exit 1
          fi

          APP_ARCHIVE="$(find artifacts -maxdepth 1 -name '*.app.tar.gz' -print -quit)"
          rm -rf /tmp/panes-app /tmp/panes-archive /tmp/panes-mount
          mkdir -p /tmp/panes-app /tmp/panes-archive /tmp/panes-mount
          tar -xzf "$APP_ARCHIVE" -C /tmp/panes-archive

          ARCHIVE_BINARY="$(find /tmp/panes-archive -path '*.app/Contents/MacOS/Panes' -print -quit)"
          if [ -z "$ARCHIVE_BINARY" ]; then
            echo "Unable to locate Panes binary inside updater archive."
            exit 1
          fi

          file "$ARCHIVE_BINARY"
          lipo -info "$ARCHIVE_BINARY"
          file "$ARCHIVE_BINARY" | grep -Eq 'arm64|aarch64'
          file "$ARCHIVE_BINARY" | grep -q 'x86_64'

          cleanup() {
            if mount | grep -q "/tmp/panes-mount"; then
              hdiutil detach /tmp/panes-mount -quiet || true
            fi
            pkill -f '/tmp/panes-app/Panes.app/Contents/MacOS/Panes' || true
          }
          trap cleanup EXIT

          hdiutil attach "$DMG_PATH" -nobrowse -quiet -mountpoint /tmp/panes-mount
          cp -R /tmp/panes-mount/Panes.app /tmp/panes-app/Panes.app

          APP_BINARY="/tmp/panes-app/Panes.app/Contents/MacOS/Panes"
          SIDECAR_PATH="$(find /tmp/panes-app/Panes.app/Contents/Resources -path '*claude-agent-sdk-server.mjs' -print -quit)"

          file "$APP_BINARY"
          lipo -info "$APP_BINARY"
          file "$APP_BINARY" | grep -Eq 'arm64|aarch64'
          file "$APP_BINARY" | grep -q 'x86_64'
          test -n "$SIDECAR_PATH"
          command -v git
          command -v node

          node "$SIDECAR_PATH" >/tmp/panes-sidecar.out 2>/tmp/panes-sidecar.err &
          SIDECAR_PID=$!
          for attempt in 1 2 3 4 5; do
            if grep -q '"type":"ready"' /tmp/panes-sidecar.out; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              cat /tmp/panes-sidecar.out || true
              cat /tmp/panes-sidecar.err || true
              echo "Bundled Claude sidecar did not reach ready state."
              exit 1
            fi
            sleep 2
          done
          if kill -0 "$SIDECAR_PID" 2>/dev/null; then
            kill "$SIDECAR_PID"
          fi

          open -g /tmp/panes-app/Panes.app
          for attempt in 1 2 3 4 5; do
            if pgrep -f '/tmp/panes-app/Panes.app/Contents/MacOS/Panes' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Panes.app did not launch on the Intel macOS runner."
              exit 1
            fi
            sleep 2
          done

      - name: Validate Homebrew install on Intel
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured; skipping Homebrew smoke test."
            exit 0
          fi

          brew tap wygoralves/tap
          brew install --cask wygoralves/tap/panes
          file /Applications/Panes.app/Contents/MacOS/Panes
          lipo -info /Applications/Panes.app/Contents/MacOS/Panes
          file /Applications/Panes.app/Contents/MacOS/Panes | grep -Eq 'arm64|aarch64'
          file /Applications/Panes.app/Contents/MacOS/Panes | grep -q 'x86_64'

  windows_release_smoke:
    name: Windows Release Smoke
    if: github.event_name == 'push' && needs.release.outputs.should_release == 'true'
    needs: [release, update_manifest]
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.release.outputs.released_tag }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          gh release download $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --dir artifacts --pattern "*-setup.exe" --pattern "*-setup.exe.sig"
          Get-ChildItem artifacts

      - name: Validate published updater manifest
        shell: pwsh
        run: |
          $setupExe = Get-ChildItem artifacts -Filter *-setup.exe | Select-Object -First 1
          if (-not $setupExe) {
            throw "Windows NSIS updater bundle was not downloaded."
          }

          $setupSig = Get-ChildItem artifacts -Filter *-setup.exe.sig | Select-Object -First 1
          if (-not $setupSig) {
            throw "Windows NSIS updater signature was not downloaded."
          }

          $env:SETUP_EXE_NAME = $setupExe.Name
          $env:SETUP_SIG = (Get-Content $setupSig.FullName -Raw).Trim()

          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Invoke-WebRequest "https://raw.githubusercontent.com/$env:GITHUB_REPOSITORY/gh-pages/latest.json" -OutFile latest.json
              break
            } catch {
              if ($attempt -eq 5) {
                throw "Unable to fetch latest.json from gh-pages."
              }
              Start-Sleep -Seconds 5
            }
          }

          $script = @'
          const fs = require("node:fs");

          const manifest = JSON.parse(fs.readFileSync("latest.json", "utf8"));
          const windows = manifest.platforms?.["windows-x86_64"];

          if (!windows) {
            throw new Error("latest.json must include windows-x86_64.");
          }

          if (!windows.signature) {
            throw new Error("latest.json Windows signature is missing.");
          }

          if (windows.signature.trim() !== process.env.SETUP_SIG) {
            throw new Error("latest.json Windows signature does not match the published .sig contents.");
          }

          if (!windows.url.endsWith(process.env.SETUP_EXE_NAME)) {
            throw new Error(`latest.json Windows URL does not reference ${process.env.SETUP_EXE_NAME}.`);
          }
          '@
          node -e $script

      - name: Validate Windows NSIS install and bundled sidecar
        shell: pwsh
        run: |
          $setupExe = Get-ChildItem artifacts -Filter *-setup.exe | Select-Object -First 1
          if (-not $setupExe) {
            throw "Windows NSIS installer was not downloaded."
          }

          $installRoot = Join-Path $env:RUNNER_TEMP "panes-smoke"
          if (Test-Path $installRoot) {
            Remove-Item -Recurse -Force $installRoot
          }

          $installer = Start-Process -FilePath $setupExe.FullName -ArgumentList @('/S', "/D=$installRoot") -Wait -PassThru
          if ($installer.ExitCode -ne 0) {
            throw "Windows installer exited with code $($installer.ExitCode)."
          }

          $appBinary = Get-ChildItem $installRoot -Recurse -Filter Panes.exe | Select-Object -First 1
          if (-not $appBinary) {
            throw "Unable to locate installed Panes.exe."
          }

          $sidecar = Get-ChildItem $installRoot -Recurse -Filter claude-agent-sdk-server.mjs | Select-Object -First 1
          if (-not $sidecar) {
            throw "Unable to locate bundled Claude sidecar in installed app."
          }

          Get-Command git | Out-Null
          Get-Command node | Out-Null

          $sidecarOut = Join-Path $env:RUNNER_TEMP "panes-sidecar.out"
          $sidecarErr = Join-Path $env:RUNNER_TEMP "panes-sidecar.err"
          if (Test-Path $sidecarOut) { Remove-Item -Force $sidecarOut }
          if (Test-Path $sidecarErr) { Remove-Item -Force $sidecarErr }

          $sidecarProc = Start-Process -FilePath node -ArgumentList $sidecar.FullName -PassThru -RedirectStandardOutput $sidecarOut -RedirectStandardError $sidecarErr
          $ready = $false
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            if ((Test-Path $sidecarOut) -and ((Get-Content $sidecarOut -Raw) -match '"type":"ready"')) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 2
          }

          if (-not $ready) {
            if (Test-Path $sidecarOut) { Get-Content $sidecarOut }
            if (Test-Path $sidecarErr) { Get-Content $sidecarErr }
            throw "Bundled Claude sidecar did not reach ready state."
          }

          if (-not $sidecarProc.HasExited) {
            Stop-Process -Id $sidecarProc.Id -Force
          }

          $appProc = Start-Process -FilePath $appBinary.FullName -WorkingDirectory $appBinary.Directory.FullName -PassThru
          Start-Sleep -Seconds 5
          if ($appProc.HasExited) {
            throw "Panes.exe exited immediately on the Windows runner."
          }
          Stop-Process -Id $appProc.Id -Force
