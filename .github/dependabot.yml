version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    allow:
      - dependency-name: "@anthropic-ai/claude-agent-sdk"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(deps)"
